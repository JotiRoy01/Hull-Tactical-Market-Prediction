version: 1
disable_existing_loggers: false

formatters:
  json:
    class: markets.logger.formatters.PrettyJsonFormatter

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: json
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: logs/agentic.log
    mode: a
    encoding: utf-8

loggers:
  agentic:
    level: DEBUG
    handlers: [console, file]
    propagate: no

root:
  level: WARNING
  handlers: [console]