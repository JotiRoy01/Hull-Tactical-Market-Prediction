version: 1
disable_existing_loggers: false

formatters:
  json:
    class: markets.logger.formatters.PrettyJsonFormatter

handlers:
  console:
    class: logging.StreamHandler
    # raise console level so normal logging doesn't print to terminal
    level: CRITICAL
    formatter: json
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: logs/markets.log
    mode: a
    encoding: utf-8

  exception_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: json
    filename: logs/exception.log
    mode: a
    encoding: utf-8

loggers:
  markets:
    level: DEBUG
    handlers: [console, file]
    propagate: no
  markets.exception:
    level: ERROR
    handlers: [exception_file]
    propagate: no

root:
  level: WARNING
  handlers: [console]